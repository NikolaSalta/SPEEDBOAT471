.prog-track{flex:1;height:4px;background:rgba(255,255,255,.15);border-radius:2px}
.prog-fill{height:100%;background:#c8983a;border-radius:2px;transition:width .3s}
.prog-counter{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#c8983a;white-space:nowrap}
.topbar-hint{font-size:10px;color:#6a5a40;font-family:'IBM Plex Mono',monospace;white-space:nowrap}

/* ── LAYOUT ── */

/* ── SIDEBAR ── */
.sidebar{width:190px;flex-shrink:0;background:#fff;border-left:1px solid #e0d8d0;overflow-y:auto;overflow-x:hidden;height:100%;-webkit-overflow-scrolling:touch}
.exam-group{margin-bottom:4px}
.exam-header{background:#f0ede8;padding:8px 12px 6px;border-bottom:1px solid #e0d8d0;border-top:1px solid #e0d8d0;position:sticky;top:0;z-index:10}
.exam-header-title{font-size:11px;font-weight:700;color:#1a1208;font-family:'IBM Plex Mono',monospace}
.exam-header-sub{font-size:9px;color:#8a7060;font-family:'IBM Plex Mono',monospace;margin-top:1px}
.sbtn{display:flex;align-items:center;gap:8px;padding:8px 10px;border:none;background:transparent;cursor:pointer;text-align:right;width:100%;transition:background .1s;border-bottom:1px solid #f0ede8}
.sbtn:hover{background:#f8f5f0}
.sbtn.active{background:#1a1208}
.sbtn.done .sb-n{background:#1a6e28;color:#fff}
.sb-n{width:26px;height:26px;border-radius:50%;background:#f0ede8;color:#6b5e4a;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'IBM Plex Mono',monospace;transition:all .15s}
.sbtn.active .sb-n{background:#c8983a;color:#1a1208}
.sb-t{font-size:12px;color:#3a3028;flex:1;text-align:right;line-height:1.25}
.sbtn.active .sb-t{color:#f5e6c8}
.sb-tag{font-size:8px;font-family:'IBM Plex Mono',monospace;padding:1px 4px;border-radius:3px;flex-shrink:0}
.sb-tag.yes{background:#e8f7e9;color:#1a6e28}
.sb-tag.no{background:#fdf0f0;color:#a82020}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;overflow-x:hidden;height:100%;-webkit-overflow-scrolling:touch;padding:16px 20px 40px}

/* ── EXAM CARD ── */
.exam-card{background:#fff;border:2px solid #1a1208;border-radius:12px;overflow:hidden;margin-bottom:14px;max-width:820px;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.ec-head{background:#1a1208;padding:12px 16px;display:flex;align-items:center;gap:12px}
.ec-badge{width:38px;height:38px;background:#c8983a;color:#1a1208;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;flex-shrink:0}
.ec-exam-tag{font-size:9px;font-family:'IBM Plex Mono',monospace;background:rgba(200,152,58,.25);color:#c8983a;padding:2px 7px;border-radius:8px;border:1px solid rgba(200,152,58,.4)}
.ec-title{font-size:15px;font-weight:700;color:#f5e6c8;flex:1}
.ec-topic{font-size:10px;color:#b8965a;font-family:'IBM Plex Mono',monospace;margin-top:2px}
.miykud-tag{font-size:10px;font-family:'IBM Plex Mono',monospace;padding:3px 8px;border-radius:10px}

.miykud-tag.no{background:#1f0808;color:#e05252;border:1px solid #c43030}

.formula{direction:ltr;font-family:'IBM Plex Mono',monospace;font-size:13px;background:#f0faf0;border:1px solid #1a6e28;border-radius:5px;padding:8px 12px;margin:8px 0;color:#0a4a18;text-align:center}

.q-img-cap{font-size:10px;color:#8a7a60;font-family:'IBM Plex Mono',monospace;margin-top:3px}

.section{background:#fff;border:1px solid #e0d8d0;border-radius:10px;overflow:hidden;margin-bottom:9px;max-width:820px}
.section.locked{opacity:.5}
.sec-head{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:background .1s}
.sec-head:hover{background:#f8f5f0}
.sec-left{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600}

.hint-num{width:24px;height:24px;background:#e0d8d0;color:#6b5e4a;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:'IBM Plex Mono',monospace;transition:all .15s}
.hint-btn.revealed .hint-num{background:#1a6e28;color:#fff}
.hint-btn-text{font-size:13px;color:#6b5e4a;flex:1;text-align:right;font-family:'IBM Plex Mono',monospace}

.hint-content{display:none;padding:10px 14px;background:#f0faf2;border-top:1px solid #d0e8d0;font-size:14px;color:#0a4a18;line-height:1.8}

.p-step:last-child{border-bottom:none}
.p-num{background:#3a28b0;color:#fff;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;min-width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}

.story-text p:last-child{margin-bottom:0}
.story-text b{color:#5a3000}
.highlight{background:#fde8c8;border-radius:3px;padding:0 3px;color:#5a3000}
.story-shortcut{margin-top:10px;background:#eeedfb;border:1px solid #5340c4;border-radius:6px;padding:9px 12px;font-size:13px;color:#3a28b0;line-height:1.7}

/* ── MNEMONIC ── */
.mnem-box{background:#f3f1fd;border:1.5px solid #5340c4;border-radius:9px;padding:14px;margin-top:10px}
.mnem-title{font-size:13px;font-weight:700;color:#1a1208;margin-bottom:9px}
.mnem-letters{display:flex;gap:5px;flex-wrap:wrap;align-items:baseline;background:#eae8f8;border-radius:7px;padding:8px 12px;margin-bottom:10px}
.ml{font-size:23px;font-weight:900}
.mw{font-size:12px;color:#6b5e4a;margin-left:2px;margin-right:7px}
.mnem-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mc{border-radius:7px;padding:9px 11px}
.mc.g{background:#eaf7ec;border:1px solid #2e8c3a}
.mc.p{background:#ededfd;border:1px solid #5340c4}
.mc.o{background:#fff5ea;border:1px solid #c46010}
.mc.r{background:#fdf0f0;border:1px solid #c43030}
.mc-l{font-size:20px;font-weight:900}
.mc.g .mc-l{color:#1a6e28}.mc.p .mc-l{color:#3a28b0}.mc.o .mc-l{color:#a04800}.mc.r .mc-l{color:#a82020}
.mc-t{font-size:12px;font-weight:700;color:#1a1208;margin:2px 0}
.mc-b{font-size:11px;color:#3a3028;line-height:1.5}

/* ── SOLUTION ── */
.sol-wrap{border:1px solid #e0d8d0;border-radius:9px;overflow:hidden}

.sub-ans-row{background:#f5fdf6;border-right:3px solid #1a6e28;padding:11px 14px}

.ans-tag{background:#1a6e28;color:#fff;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px}
.ans-lbl{font-size:11px;color:#6b5e4a;font-family:'IBM Plex Mono',monospace}

.m{font-family:'IBM Plex Mono',monospace;font-size:12px;background:#e4f4e4;padding:1px 5px;border-radius:3px;color:#0a4a18}
.proof{width:100%;border-collapse:collapse;font-size:13px;margin:8px 0}
.proof th{font-family:'IBM Plex Mono',monospace;font-size:9px;color:#6b5e4a;padding:4px 10px;border-bottom:1px solid #e0d8d0;text-align:right}
.proof td{padding:5px 10px;border-bottom:1px dotted #e0d8d0}

.hint-box{background:#fffef8;border:1px dashed #a04800;border-radius:5px;padding:8px 12px;margin-top:8px;font-size:13px;color:#7a3800;line-height:1.7}
.warn-box{background:#fffef5;border:1px solid #b89010;border-radius:5px;padding:8px 12px;margin-top:8px}
.warn-title{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;color:#6a5000;margin-bottom:3px}
.warn-text{font-size:13px;color:#5a4000;line-height:1.7}
.sol-img{background:#fafaf7;border:1px solid #e0d8d0;border-radius:7px;padding:8px;margin:10px 0 4px;text-align:center}
.sol-img img{max-width:100%;border-radius:4px}
.sol-img-cap{font-size:10px;color:#8a7a60;font-family:'IBM Plex Mono',monospace;margin-top:3px}

/* ── UNLOCK BUTTON ── */
.unlock-btn{display:flex;align-items:center;justify-content:center;width:100%;padding:11px 16px;margin-top:10px;background:#f8f5f0;border:1.5px solid #8a6820;color:#5a3800;border-radius:8px;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}

/* ── DONE ── */
.done-banner{background:#e8f7e9;border:1.5px solid #1a6e28;border-radius:10px;padding:20px;text-align:center;margin-top:14px}
.done-icon{font-size:42px}
.done-text{color:#0a4a18;font-size:16px;font-weight:700;margin-top:8px}

/* ── MOBILE BOTTOM NAV ── */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#1a1208;border-top:1px solid #3a3020;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:6px 8px;padding-bottom:calc(6px + env(safe-area-inset-bottom,0px));z-index:200}

.bnav-btn.active{background:#c8983a;color:#1a1208;border-color:#c8983a;font-weight:700}
.bnav-btn-num{font-size:13px;font-weight:900;display:block}
.bnav-btn-lbl{font-size:8px;display:block;margin-top:1px}

/* ── SEARCH/FILTER BAR ── */
.filter-bar{padding:10px 10px 6px;border-bottom:1px solid #e0d8d0;background:#fff;position:sticky;top:0;z-index:5}
.filter-row{display:flex;gap:6px;margin-bottom:6px}
.exam-filter-btn{flex:1;padding:5px 8px;border:1px solid #e0d8d0;border-radius:6px;background:transparent;color:#6b5e4a;font-size:10px;font-family:'IBM Plex Mono',monospace;cursor:pointer;text-align:center;transition:all .15s}

.exam-filter-btn.active{background:#1a1208;color:#c8983a;border-color:#1a1208;font-weight:700}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .sidebar{display:none}
  .bottom-nav{display:flex}
  .content{padding-bottom:calc(var(--nav-h,60px) + env(safe-area-inset-bottom,0px) + 16px)}

}
@media print{.topbar,.sidebar,.bottom-nav{display:none}.content{padding:0}.sec-body{display:block!important}}
</style>

const QUESTIONS = [
{
    examId: "special2021",
    id: 1,
    title: "הסתברות — שקיות וסוכריות",
    topic: "🎲 הסתברות",
    miykud: "yes",
    miykudText: "✅ יופיע 2026",

    questionHTML: `
      <p><b>בשקית א׳</b> יש 4 סוכריות טופי ו-2 סוכריות מנטה.<br>
      <b>בשקית ב׳</b> יש 3 סוכריות טופי ו-3 סוכריות מנטה.<br>
      בוחרים באקראי שקית אחת, ומוציאים ממנה באקראי סוכריה אחת.</p>
      <p style="margin-top:10px"><b>א.</b> מהי ההסתברות להוציא סוכריית מנטה?<br>
      <b>ב.</b> ידוע שהוצאה סוכריית מנטה. מה ההסתברות שהוצאה משקית א׳?<br>
      <b>ג.</b> משקית א׳ מוציאים <u>ללא החזרה</u> שתי סוכריות. מהי ההסתברות שלא יישארו מנטה?</p>`,

const IMAGES = {};

// ── STATE ─────────────────────────────────────────
var currentIdx = 0;
var unlocked = {};
var revealed = {};
var currentFilter = 'all';
var SEC_NAMES = ['hints','pattern','story','solution'];
var EXAM_LABELS = {
  'special2021': 'מיוחד 21',
  'winter2026': 'חורף 26',
  'summer2020a': 'קיץ 20א',
  'summer2020b': 'קיץ 20ב',
  'summer2021b': 'קיץ 21ב',
  'summer2022a': 'קיץ 22א',
  'summer2022b': 'קיץ 22ב',
  'summer2023a': 'קיץ 23א',
  'summer2023b': 'קיץ 23ב',
  'summer2023sp': 'נבצרים 23',
  'summer2024b': 'קיץ 24ב',
  'summer2025b': 'קיץ 25ב',
  'winter2021': 'חורף 21',
  'winter2022': 'חורף 22',
  'winter2022feb': 'חורף 22פב',
  'winter2023': 'חורף 23',
  'winter2024': 'חורף 24',
  'winter2025': 'חורף 25'
};

function getUnlocked(i){if(!unlocked[i])unlocked[i]=new Set(['question','hints']);return unlocked[i];}
function setHas(s,v){try{return s.has(v);}catch(e){return false;}}

function filteredQuestions(){
  if(currentFilter==='all') return QUESTIONS;
  return QUESTIONS.filter(function(q){return q.examId===currentFilter;});
}

// ── SIDEBAR ─────────────────────────────────────────
function buildSidebar(){
  var fq = filteredQuestions();
  var list = document.getElementById('sidebarList');
  var html = '';
  var lastExam = '';
  
  fq.forEach(function(q, fi){
    var globalIdx = QUESTIONS.indexOf(q);
    if(q.examId !== lastExam){
      lastExam = q.examId;
      html += '<div class="exam-group">';
      html += '<div class="exam-header"><div class="exam-header-title">'+(EXAM_LABELS[q.examId]||q.examId)+'</div></div>';
    }
    var isActive = globalIdx === currentIdx;
    var isDone = unlocked[globalIdx] && setHas(unlocked[globalIdx],'solution');
    html += '<button class="sbtn'+(isActive?' active':'')+(isDone?' done':'') +'" onclick="showQ('+globalIdx+')">';
    html += '<span class="sb-n">'+q.id+'</span>';
    html += '<span class="sb-t">'+q.title.replace('פונקציה רציונלית ','')+'</span>';
    html += '<span class="sb-tag '+q.miykud+'">'+( q.miykud==='yes'?'✅':'❌')+'</span>';
    html += '</button>';
  });
  list.innerHTML = html;
  
  // scroll active into view
  setTimeout(function(){
    try{var active=list.querySelector('.sbtn.active');if(active)active.scrollIntoView({block:'nearest'});}catch(e){}
  },50);
}

function buildBottomNav(){
  var fq = filteredQuestions();
  var html = '';
  fq.forEach(function(q,fi){
    var gIdx = QUESTIONS.indexOf(q);
    var isActive = gIdx === currentIdx;
    html += '<button class="bnav-btn'+(isActive?' active':'')+'" onclick="showQ('+gIdx+')">';
    html += '<span class="bnav-btn-num">'+q.id+'</span>';
    var lbl = q.title.split('—')[0].trim().substring(0,6);
    html += '<span class="bnav-btn-lbl">'+lbl+'</span></button>';
  });
  document.getElementById('bottomNav').innerHTML = html;
}

// ── SHOW QUESTION ─────────────────────────────────────────
function showQ(globalIdx){
  currentIdx = globalIdx;
  var q = QUESTIONS[globalIdx];
  
  document.getElementById('topbarSub').textContent = (EXAM_LABELS[q.examId]||q.examId) + ' | שאלה ' + q.id;
  var fq = filteredQuestions();
  var localIdx = fq.indexOf(q);
  var total = fq.length;
  document.getElementById('progFill').style.width = ((localIdx+1)/total*100)+'%';
  document.getElementById('progCounter').textContent = (localIdx+1)+'/'+total;
  
  renderQ(globalIdx);
  buildSidebar();
  buildBottomNav();
  var ca = document.getElementById('contentArea');
  if(ca) ca.scrollTop=0;
}

function filterExam(examId){
  currentFilter = examId;
  // Update filter buttons
  ['all','special2021','winter2026','summer2020a','summer2020b','summer2021b','summer2022a','summer2022b','summer2023a','summer2023b','summer2023sp','summer2024b','summer2025b','winter2021','winter2022','winter2022feb','winter2023','winter2024','winter2025'].forEach(function(id){
    var btn = document.getElementById('fb-'+id);
    if(btn) btn.classList.toggle('active', id===examId);
  });
  // Jump to first question of this filter
  var fq = filteredQuestions();
  if(fq.length > 0){
    showQ(QUESTIONS.indexOf(fq[0]));
  }
}

// ── RENDER ─────────────────────────────────────────
function renderQ(idx){
  try{
  var q = QUESTIONS[idx];
  var ul = getUnlocked(idx);
  var h = '';

  // Exam card
  var imgH = (q.questionImgKey && IMAGES[q.questionImgKey])
    ? '<div class="q-img"><img src="data:image/png;base64,'+IMAGES[q.questionImgKey]+'" alt=""><div class="q-img-cap">'+(q.questionImgCap||'')+'</div></div>' : '';
  h += '<div class="exam-card"><div class="ec-head">';
  h += '<div class="ec-badge">'+q.id+'</div>';
  h += '<div style="flex:1"><div class="ec-title">'+q.title+'</div><div class="ec-topic">'+q.topic+'</div></div>';
  h += '<span class="ec-exam-tag">'+(EXAM_LABELS[q.examId]||'')+'</span>';
  h += '<span class="miykud-tag '+q.miykud+'">'+q.miykudText+'</span>';
  h += '</div><div class="ec-body">'+q.questionHTML+imgH+'</div></div>';

  // Hints (code 1)
  var hh='<div class="hints-list">';
  for(var hi=0;hi<q.hints.length;hi++){var ht=q.hints[hi],r=revealed[idx+'_'+hi];
    hh+='<div class="hint-row"><button class="hint-btn'+(r?' revealed':'')+'" onclick="revealHint('+idx+','+hi+')">';
    hh+='<span class="hint-num">'+(hi+1)+'</span><span class="hint-btn-text">'+ht.title+(r?'':' ← לחץ')+'</span></button>';
    hh+='<div class="hint-content'+(r?' open':'')+'">'+ht.text+'</div></div>';
  }
  hh+='</div><button class="unlock-btn" onclick="unlock('+idx+',1)">הבנתי — הצג פטרון ←</button>';
  h += section(idx,'hints','?? רמזים',hh,setHas(ul,'hints'),false);

  // Pattern (code 2)
  var ph='<ol class="p-steps">';
  for(var pi=0;pi<q.patternSteps.length;pi++){var ps=q.patternSteps[pi];
    ph+='<li class="p-step"><span class="p-num">'+(pi+1)+'</span><span><span class="p-key">'+ps.key+':</span> '+ps.body+'</span></li>';
  }
  ph+='</ol><button class="unlock-btn" onclick="unlock('+idx+',2)">הבנתי — הצג סיפור ←</button>';
  h += section(idx,'pattern','?? פטרון',ph,setHas(ul,'pattern'),!setHas(ul,'pattern'));

  // Story + mnem (code 3)
  var sh=(q.storyHTML||'')+buildMnem(q.mnem);
  sh+='<button class="unlock-btn" style="margin-top:12px" onclick="unlock('+idx+',3)">מוכן — הצג פתרון מלא ←</button>';
  h += section(idx,'story','✨ סיפור ומנמוניקה',sh,setHas(ul,'story'),!setHas(ul,'story'));

  // Solution
  var sl='<div class="sol-wrap">';
  for(var qi2=0;qi2<q.subQAs.length;qi2++) sl+=buildSubQA(q.subQAs[qi2]);
  sl+='</div>';
  // Show ALL solution PDF pages
  if(q.questionImgKey){
    var baseKey = q.questionImgKey.replace(/_p\d+$/, '');
    var pg = 2;
    while(IMAGES[baseKey + '_p' + pg]){
      sl += '<div class="sol-img"><img src="data:image/png;base64,' + IMAGES[baseKey + '_p' + pg] + '" alt=""><div class="sol-img-cap">פתרון מלא — עמוד ' + pg + '</div></div>';
      pg++;
    }
  }
  // Next question navigation
  var fq2 = filteredQuestions();
  var localIdx2 = fq2.indexOf(q);
  if(localIdx2 < fq2.length-1){
    var nq=fq2[localIdx2+1], nIdx=QUESTIONS.indexOf(nq);
    sl+='<button class="unlock-btn green" onclick="showQ('+nIdx+')" style="margin-top:12px">';
    sl+='שאלה '+nq.id+': '+nq.title+' →</button>';
  } else {
    sl+='<div class="done-banner"><div class="done-icon">??</div><div class="done-text">סיימת!</div></div>';
  }
  h += section(idx,'solution','?? פתרון מלא',sl,setHas(ul,'solution'),!setHas(ul,'solution'));

  document.getElementById('mainContent').innerHTML = h;
  ul.forEach(function(s){
    var b=document.getElementById('B_'+idx+'_'+s),a=document.getElementById('A_'+idx+'_'+s);
    if(b)b.classList.add('open');if(a)a.classList.add('open');
  });
  }catch(e){document.getElementById('mainContent').innerHTML='<div style="padding:20px;color:red">שגיאה: '+e.message+'</div>';console.error(e);}
}

function section(qi,sec,label,content,unlkd,locked){
  var ls=locked?' locked':'', oc=locked?'':' onclick="toggleSec('+qi+','+JSON.stringify(sec)+')"';
  var bc=locked?'<p style="color:#8a7a60;font-size:13px">פתח את השלב הקודם...</p>':content;
  var pts=label.split(' '),icon=pts[0],lbl=pts.slice(1).join(' ');
  return '<div class="section'+ls+'" data-sec="'+sec+'">'
    +'<div class="sec-head"'+oc+'><div class="sec-left"><span class="sec-icon">'+icon+'</span><span>'+lbl+'</span></div>'
    +'<span class="sec-arrow" id="A_'+qi+'_'+sec+'">▼</span></div>'
    +'<div class="sec-body" id="B_'+qi+'_'+sec+'">'+bc+'</div></div>';
}

function buildMnem(m){
  if(!m)return'';
  var L='';for(var i=0;i<m.letters.length;i++){var l=m.letters[i];L+='<span class="ml" style="color:'+l.c+'">'+l.l+'</span><span class="mw">'+l.w+'</span>';}
  var C='';for(var i=0;i<m.cards.length;i++){var c=m.cards[i];C+='<div class="mc '+c.c+'"><div class="mc-l">'+c.l+'</div><div class="mc-t">'+c.t+'</div><div class="mc-b">'+c.b+'</div></div>';}
  return '<div class="mnem-box"><div class="mnem-title">?? מנמוניקה</div><div class="mnem-letters">'+L+'</div><div class="mnem-cards">'+C+'</div></div>';
}

function buildSubQA(qa){
  var st='<ul class="ans-steps">';for(var i=0;i<qa.steps.length;i++){var s=qa.steps[i];st+='<li class="ans-step"><span class="sn">'+s.n+'</span><span>'+s.t+'</span></li>';}st+='</ul>';
  var im=(qa.imgKey&&IMAGES[qa.imgKey])?'<div class="sol-img"><img src="data:image/png;base64,'+IMAGES[qa.imgKey]+'" alt=""><div class="sol-img-cap">'+(qa.imgCap||'')+'</div></div>':'';
  var hn=qa.hint?'<div class="hint-box">?? '+qa.hint+'</div>':'';
  var wn=qa.warn?'<div class="warn-box"><div class="warn-title">⚠️ טעות נפוצה</div><div class="warn-text">'+qa.warn+'</div></div>':'';
  return '<div class="sub-block"><div class="sub-q-row"><span class="sub-badge">'+qa.badge+'</span><span class="sub-q-text">'+qa.q+'</span></div><div class="sub-ans-row"><div class="ans-top"><span class="ans-tag">✅</span><span class="ans-lbl">תשובה:</span><span class="final-val">'+qa.final+'</span></div>'+im+st+hn+wn+'</div></div>';
}

// ── ACTIONS ─────────────────────────────────────────
function toggleSec(qi,sec){var b=document.getElementById('B_'+qi+'_'+sec),a=document.getElementById('A_'+qi+'_'+sec);if(!b)return;b.classList.toggle('open');if(a)a.classList.toggle('open');}
function unlock(qi,sec){if(typeof sec==='number')sec=SEC_NAMES[sec]||'hints';getUnlocked(qi).add(sec);renderQ(qi);setTimeout(function(){var el=document.getElementById('B_'+qi+'_'+sec);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},120);}
function revealHint(qi,hi){revealed[qi+'_'+hi]=true;renderQ(qi);}

// ── KEYBOARD ─────────────────────────────────────────
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT')return;
  var fq=filteredQuestions();
  var li=fq.indexOf(QUESTIONS[currentIdx]);
  if(e.key==='ArrowLeft'&&li<fq.length-1){e.preventDefault();showQ(QUESTIONS.indexOf(fq[li+1]));}
  if(e.key==='ArrowRight'&&li>0){e.preventDefault();showQ(QUESTIONS.indexOf(fq[li-1]));}
  if(e.key>='1'&&e.key<='9'){var n=parseInt(e.key)-1;if(n<fq.length)showQ(QUESTIONS.indexOf(fq[n]));}
  if(e.key==='f'||e.key==='F'){
    var filters=['all','special2021','winter2026','summer2020a','summer2020b','summer2021b','summer2022a','summer2022b','summer2023a','summer2023b','summer2023sp','summer2024b','summer2025b','winter2021','winter2022','winter2022feb','winter2023','winter2024','winter2025'];
    var ci=filters.indexOf(currentFilter);
    filterExam(filters[(ci+1)%filters.length]);
  }
});

// ── SWIPE (mobile) ────────────────────────────────────
var tx=0;
document.addEventListener('touchstart',function(e){tx=e.changedTouches[0].screenX;},{passive:true});
document.addEventListener('touchend',function(e){
  var dx=e.changedTouches[0].screenX-tx;
  if(Math.abs(dx)<70)return;
  var fq=filteredQuestions(),li=fq.indexOf(QUESTIONS[currentIdx]);
  if(dx<-70&&li<fq.length-1)showQ(QUESTIONS.indexOf(fq[li+1]));
  if(dx>70&&li>0)showQ(QUESTIONS.indexOf(fq[li-1]));
},{passive:true});

// ── INIT ─────────────────────────────────────────────
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',function(){buildSidebar();buildBottomNav();showQ(0);});
}else{
  buildSidebar();buildBottomNav();showQ(0);
}
// ── PWA: Register Service Worker ──────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(function(reg){
    console.log('SW registered', reg.scope);
  }).catch(function(err){
    console.log('SW failed', err);
  });
}

// ── PWA: Install prompt ──────────────────────────────
var deferredPrompt;
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();
  deferredPrompt=e;
  // Show install button in topbar
  var btn=document.createElement('button');
  btn.textContent='\u05d4\u05ea\u05e7\u05df';
  btn.style.cssText='background:#c8983a;color:#1a1208;border:none;padding:4px 12px;border-radius:6px;font-family:IBM Plex Mono,monospace;font-size:11px;font-weight:700;cursor:pointer;margin-right:8px';
  btn.onclick=function(){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(r){
      if(r.outcome==='accepted')btn.remove();
      deferredPrompt=null;
    });
  };
  var tb=document.querySelector('.topbar');
  if(tb)tb.appendChild(btn);
});

(function(){['images1.js','images2.js','flashcards.js'].forEach(function(s){var e=document.createElement('script');e.src=s;e.onload=function(){if(s==='images2.js'&&typeof showQ==='function'&&typeof currentIdx!=='undefined')showQ(currentIdx)};document.body.appendChild(e)})})();
</script>
