<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1208">
<title>471 — בגרות מתמטיקה</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#1a1208;color:#f5e6c8;height:100vh;display:flex;align-items:center;justify-content:center}
.lock{text-align:center;padding:40px;max-width:360px}
.lock h1{font-size:48px;color:#c8983a;margin-bottom:8px}
.lock h2{font-size:18px;font-weight:400;color:#b8965a;margin-bottom:32px}
.lock input{width:100%;padding:14px 18px;border:2px solid #c8983a;background:#2a1a08;color:#f5e6c8;border-radius:10px;font-size:18px;text-align:center;outline:none;font-family:monospace;letter-spacing:3px}
.lock input:focus{border-color:#f5e6c8;box-shadow:0 0 20px rgba(200,152,58,.3)}
.lock button{width:100%;margin-top:16px;padding:14px;background:#c8983a;color:#1a1208;border:none;border-radius:10px;font-size:18px;font-weight:700;cursor:pointer}
.lock button:hover{background:#e0b050}
.lock .err{color:#e05252;margin-top:12px;font-size:14px;display:none}
.lock .info{color:#6a5a40;margin-top:20px;font-size:12px}
</style>
</head>
<body>
<div class="lock">
<h1>471</h1>
<h2>בגרות מתמטיקה — 141 שאלות</h2>
<input type="password" id="pw" placeholder="סיסמה" autofocus>
<button onclick="check()">כניסה</button>
<div class="err" id="err">סיסמה שגויה</div>
<div class="info">18 מבחנים | חורף + קיץ 2020-2026</div>
</div>
<script>
function check(){
  var p=document.getElementById('pw').value;
  if(p==='Aayabdex7788'){
    window.location.href='index_app.html';
  }else{
    document.getElementById('err').style.display='block';
    document.getElementById('pw').value='';
    document.getElementById('pw').focus();
  }
}
document.getElementById('pw').addEventListener('keydown',function(e){
  if(e.key==='Enter')check();
});
</script>
</body>
</html>
